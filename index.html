
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELUS Rewards Content Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const TELUSRewardsDashboard = () => {
      const [content, setContent] = useState([]);
      const [planner, setPlanner] = useState([]);
      const [view, setView] = useState('calendar');
      const [selectedMonth, setSelectedMonth] = useState(new Date());
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [showGenerateModal, setShowGenerateModal] = useState(false);
      const [showRepurposeModal, setShowRepurposeModal] = useState(false);
      const [showBrandGuide, setShowBrandGuide] = useState(false);
      const [showPlannerModal, setShowPlannerModal] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [repurposingId, setRepurposingId] = useState(null);
      const [selectedChannels, setSelectedChannels] = useState({});
      const [selectedCatalogueItems, setSelectedCatalogueItems] = useState([]);
      const [formData, setFormData] = useState({ title: '', channel: '', date: '', status: 'draft', content: '', description: '' });
      const [plannerData, setPlannerData] = useState({ contentType: '', deploymentDate: '', status: 'not started' });
      const [reviewingId, setReviewingId] = useState(null);
      const [reviewData, setReviewData] = useState({ documentUrl: '', reviewerEmails: '' });
      const [editingPlanId, setEditingPlanId] = useState(null);
      const [editPlanData, setEditPlanData] = useState({});

      const templates = {
        newsletter: `Hi TELUS Rewards members! 🎉

[Your message here - tell members what's new and exciting]

Featured offers:
[Add featured items here]

[Call to action - invite them to earn or redeem]

Keep earning, keep rewarding!
TELUS Rewards Team`,
        social: `🎯 [Attention-grabbing opening]

[Main message about the offer or opportunity]

[Include featured items if applicable]

[Call to action with emoji]

#TELUSRewards #MembersFirst`,
        twitter: `🎁 [Short, punchy message about offer]

TELUS Rewards members can [action] today!

[Brief detail about featured items]

#TELUSRewards`,
        facebook: `Hey TELUS Rewards members! 👋

[Tell them about this great opportunity]

✨ Featured:
[List your featured items]

Ready to earn more points? [CTA]

👉 [Link or next steps]`,
        email: `Subject: [Exciting offer for TELUS Rewards members]

---

Hi [Member Name],

We've got something special for our TELUS Rewards members!

[Main message about the offer]

This week's highlights:
• [Featured item 1]
• [Featured item 2]
• [Featured item 3]

[Call to action - invite them to take action]

Best regards,
TELUS Rewards Team`
      };

      const catalogue = {
        "My TELUS Perks": [
          { id: "perk-1", name: "TELUS 1-Day Roaming Pass", value: "Unlimited international data & calls", tier: "Gold+" },
          { id: "perk-2", name: "TELUS 3-Day Roaming Pass", value: "Unlimited international data & calls", tier: "Diamond" },
          { id: "perk-3", name: "Mobile Klinik Protector Pro", value: "Phone repair & protection", tier: "Purple+" },
          { id: "perk-4", name: "TELUS Health MyCare Counselling", value: "Professional counselling", tier: "Gold+" },
          { id: "perk-5", name: "Seat Selection Vouchers", value: "Free WestJet seat selection", tier: "Platinum+" }
        ],
        "My Partner Perks": [
          { id: "perk-6", name: "WestJet Rewards Points", value: "Convert points to travel", tier: "All" },
          { id: "perk-7", name: "Skip the Dishes Code", value: "$15-30 off delivery", tier: "Gold+" },
          { id: "perk-8", name: "Turo Car Rental Credit", value: "$50 off rentals", tier: "Platinum+" },
          { id: "perk-9", name: "TELUS Rewards Hotel Credits", value: "Stackable discounts", tier: "Gold+" },
          { id: "perk-10", name: "Cineplex Entertainment", value: "Movie discounts", tier: "Purple+" }
        ],
        "Gift Cards": [
          { id: "gc-1", name: "Amazon Gift Card", value: "$25, $50, $100", pointsCost: "2500-10000" },
          { id: "gc-2", name: "Uber Gift Card", value: "$10-$50", pointsCost: "1000-5000" },
          { id: "gc-3", name: "DoorDash Gift Card", value: "$15-$75", pointsCost: "1500-7500" },
          { id: "gc-4", name: "Spotify Premium", value: "3-month subscription", pointsCost: "3000" },
          { id: "gc-5", name: "Apple iTunes Card", value: "$15-$50", pointsCost: "1500-5000" }
        ],
        "Contests": [
          { id: "contest-1", name: "WestJet Flight Giveaway", value: "Round-trip flights", entry: "Zero-point entry" },
          { id: "contest-2", name: "Staycation Package", value: "$2000 hotel credit", entry: "Zero-point entry" },
          { id: "contest-3", name: "Tech Bundle", value: "Latest tech gadgets", entry: "Zero-point entry" }
        ]
      };

      useEffect(() => {
        const stored = localStorage.getItem('telusContent');
        if (stored) setContent(JSON.parse(stored));
        else {
          const sample = [
            { id: 1, title: 'Summer Rewards Promo', channel: 'newsletter', date: '2026-06-20', status: 'scheduled', content: 'TELUS Rewards members can earn more points...', description: 'Summer promotion' },
            { id: 2, title: 'Weekend Bonus', channel: 'social', date: '2026-06-15', status: 'pending', content: 'Double points this weekend for TELUS Rewards members!', description: 'Instagram post' }
          ];
          setContent(sample);
        }
      }, []);

      useEffect(() => {
        const storedPlanner = localStorage.getItem('telusPlanner');
        if (storedPlanner) setPlanner(JSON.parse(storedPlanner));
      }, []);

      useEffect(() => {
        localStorage.setItem('telusContent', JSON.stringify(content));
      }, [content]);

      useEffect(() => {
        localStorage.setItem('telusPlanner', JSON.stringify(planner));
      }, [planner]);

      const handleChannelChange = (channel) => {
        setFormData({
          ...formData,
          channel,
          content: templates[channel] || ''
        });
      };

      const generateContent = async () => {
        if (!formData.description || !formData.channel) {
          alert('Please fill in description and channel');
          return;
        }
        setGenerating(true);
        try {
          let catalogueContext = '';
          if (selectedCatalogueItems.length > 0) {
            const featured = [];
            Object.values(catalogue).forEach(items => {
              items.forEach(item => {
                if (selectedCatalogueItems.includes(item.id)) {
                  featured.push(`- ${item.name}`);
                }
              });
            });
            catalogueContext = `\n\nFEATURED ITEMS:\n${featured.join('\n')}`;
          }

          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 1000,
              messages: [{
                role: 'user',
                content: `Fill in this ${formData.channel} template with compelling copy. Keep the structure but replace the bracketed sections with the actual content. Rules: Use "TELUS Rewards" and "members", not "customers". Capitalize tiers (Purple, Gold, Platinum, Diamond). Never say "free perks" or "best program". Brand voice: Customers First, Innovative, Engaging.\n\nTemplate:\n${formData.content}\n\nDescription: ${formData.description}${catalogueContext}\n\nProvide ONLY the filled template.`
              }]
            })
          });

          const data = await response.json();
          const text = data.content[0]?.text || 'Content generated';
          setFormData({ ...formData, content: text });
          setShowGenerateModal(false);
          alert('Template filled! Review and adjust as needed.');
        } catch (error) {
          alert('Error: ' + error.message);
        }
        setGenerating(false);
      };

      const repurposeContent = async () => {
        const item = content.find(c => c.id === repurposingId);
        const channels = Object.keys(selectedChannels).filter(ch => selectedChannels[ch]);
        if (channels.length === 0) { alert('Select channels'); return; }

        setGenerating(true);
        try {
          for (const channel of channels) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 500,
                messages: [{
                  role: 'user',
                  content: `Adapt this for ${channel} using this template:\n\n${templates[channel]}\n\nOriginal content: ${item.content}\n\nFill the template with adapted content. Keep TELUS Rewards branding and "members" not "customers". Provide ONLY the filled template.`
                }]
              })
            });
            const data = await response.json();
            const newItem = {
              id: Date.now() + Math.random(),
              title: `${item.title} - ${channel}`,
              channel,
              date: item.date,
              status: 'draft',
              content: data.content[0]?.text || 'Generated',
              description: `From: ${item.title}`
            };
            setContent(prev => [...prev, newItem]);
          }
          setShowRepurposeModal(false);
          setSelectedChannels({});
          alert('Repurposed!');
        } catch (error) {
          alert('Error: ' + error.message);
        }
        setGenerating(false);
      };

      const saveContent = () => {
        if (!formData.title || !formData.channel || !formData.date || !formData.content) {
          alert('Fill all fields');
          return;
        }
        setContent([...content, { ...formData, id: Date.now(), status: 'draft' }]);
        setFormData({ title: '', channel: '', date: '', status: 'draft', content: '', description: '' });
        setSelectedCatalogueItems([]);
        setShowCreateModal(false);
      };

      const deleteContent = (id) => setContent(content.filter(c => c.id !== id));
      const updateStatus = (id, status) => setContent(content.map(c => c.id === id ? { ...c, status } : c));

      const savePlannerItem = () => {
        if (!plannerData.contentType || !plannerData.deploymentDate) {
          alert('Fill all planner fields');
          return;
        }
        setPlanner([...planner, { ...plannerData, id: Date.now(), status: 'not started' }]);
        setPlannerData({ contentType: '', deploymentDate: '', status: 'not started' });
        setShowPlannerModal(false);
      };

      const deletePlannerItem = (id) => setPlanner(planner.filter(p => p.id !== id));
      const updatePlannerStatus = (id, status) => setPlanner(planner.map(p => p.id === id ? { ...p, status } : p));

      const sendForReview = () => {
        if (!reviewData.reviewerEmails || !reviewData.documentUrl) {
          alert('Please fill in document URL and reviewer emails');
          return;
        }
        const item = planner.find(p => p.id === reviewingId);
        const emailList = reviewData.reviewerEmails.split(',').map(e => e.trim()).join(',');
        const subject = `Review Needed: ${item.contentType} - Due ${item.deploymentDate}`;
        const body = `Hi Team,\n\nPlease review the following ${item.contentType} content:\n\nDocument: ${reviewData.documentUrl}\n\nDeployment Date: ${item.deploymentDate}\n\nPlease provide feedback and approval.\n\nThanks!`;
        const mailtoLink = `mailto:${emailList}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        window.location.href = mailtoLink;
        updatePlannerStatus(reviewingId, 'for review');
        setReviewingId(null);
        setReviewData({ documentUrl: '', reviewerEmails: '' });
      };

      const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      const getContentForDate = (day) => {
        const dateStr = `${selectedMonth.getFullYear()}-${String(selectedMonth.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return content.filter(c => c.date === dateStr);
      };

      const getPlannerForDate = (day) => {
        const dateStr = `${selectedMonth.getFullYear()}-${String(selectedMonth.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return planner.filter(p => p.deploymentDate === dateStr);
      };

      const channelColors = { newsletter: 'bg-blue-100 text-blue-800', social: 'bg-purple-100 text-purple-800', contest: 'bg-green-100 text-green-800', email: 'bg-orange-100 text-orange-800', twitter: 'bg-cyan-100 text-cyan-800', facebook: 'bg-indigo-100 text-indigo-800' };
      const statusColors = { draft: 'bg-gray-100 text-gray-800', pending: 'bg-yellow-100 text-yellow-800', scheduled: 'bg-blue-100 text-blue-800', published: 'bg-green-100 text-green-800' };
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

      return (
        <div className="min-h-screen bg-gradient-to-br from-red-50 to-gray-100">
          <div className="bg-red-700 text-white p-6 shadow-lg">
            <h1 className="text-3xl font-bold">TELUS Rewards Content Hub</h1>
            <p className="text-red-100">Manage, create, and schedule content with AI</p>
          </div>

          <div className="max-w-7xl mx-auto p-6">
            <div className="flex gap-4 mb-6 flex-wrap">
              <button onClick={() => setView('calendar')} className={`px-4 py-2 rounded-lg font-medium ${view === 'calendar' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📅 Calendar</button>
              <button onClick={() => setView('list')} className={`px-4 py-2 rounded-lg font-medium ${view === 'list' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📝 Content</button>
              <button onClick={() => setView('catalogue')} className={`px-4 py-2 rounded-lg font-medium ${view === 'catalogue' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📚 Catalogue</button>
              <button onClick={() => setShowBrandGuide(!showBrandGuide)} className="px-4 py-2 bg-white text-gray-700 rounded-lg font-medium">📖 Brand Guide</button>
              <button onClick={() => setView('planner')} className={`px-4 py-2 rounded-lg font-medium ${view === 'planner' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📋 Planner</button>
              <button onClick={() => { setShowCreateModal(true); setFormData({ title: '', channel: '', date: '', status: 'draft', content: '', description: '' }); setSelectedCatalogueItems([]); }} className="ml-auto px-4 py-2 bg-red-700 text-white rounded-lg font-medium">➕ New</button>
            </div>

            {showBrandGuide && (
              <div className="bg-white rounded-lg shadow-lg p-6 mb-6 border-l-4 border-red-700 max-h-96 overflow-y-auto">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-xl font-bold">📋 Brand Guidelines</h3>
                  <button onClick={() => setShowBrandGuide(false)} className="text-2xl font-bold text-gray-500">✕</button>
                </div>
                <div className="space-y-4 text-sm">
                  <div>
                    <h4 className="font-bold text-red-700 mb-2">Core Positioning</h4>
                    <p className="text-gray-700">TELUS Rewards is Canada's first and only tier-based loyalty program offered by a national telecommunications company.</p>
                  </div>
                  <div>
                    <h4 className="font-bold text-red-700 mb-2">Four Pillars</h4>
                    <p className="text-gray-700">Inclusive • Simple • Meaningful • Rewarding</p>
                  </div>
                  <div className="bg-green-50 p-3 rounded">
                    <h4 className="font-bold text-green-800 mb-2">✅ Always Use</h4>
                    <p className="text-green-800">TELUS Rewards • Members • Earn points • Purple, Gold, Platinum, Diamond</p>
                  </div>
                  <div className="bg-red-50 p-3 rounded">
                    <h4 className="font-bold text-red-800 mb-2">❌ Never Use</h4>
                    <p className="text-red-800">Telus • Customers • Free perks • Best program</p>
                  </div>
                  <div>
                    <h4 className="font-bold text-red-700 mb-2">Key Metrics</h4>
                    <p className="text-gray-700">1.5M+ members • 39.5% penetration • $400-$750 annual value</p>
                  </div>
                </div>
              </div>
            )}

            {view === 'catalogue' && (
              <div className="space-y-6">
                {Object.entries(catalogue).map(([category, items]) => (
                  <div key={category} className="bg-white rounded-lg shadow-lg p-6">
                    <h3 className="text-xl font-bold text-red-700 mb-4">{category}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {items.map(item => (
                        <div key={item.id} className="border rounded-lg p-4">
                          <h4 className="font-bold text-gray-800">{item.name}</h4>
                          <p className="text-sm text-gray-600 mb-2">{item.value}</p>
                          <div className="flex gap-2 flex-wrap">
                            {item.tier && <span className="text-xs bg-red-100 text-red-800 px-2 py-1 rounded">{item.tier}</span>}
                            {item.pointsCost && <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">{item.pointsCost}</span>}
                            {item.entry && <span className="text-xs bg-green-100 text-green-800 px-2 py-1 rounded">{item.entry}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view === 'list' && (
              <div className="space-y-4">
                {content.length === 0 ? (
                  <div className="bg-white rounded-lg shadow p-8 text-center text-gray-500">No content yet!</div>
                ) : (
                  content.map(item => (
                    <div key={item.id} className="bg-white rounded-lg shadow p-4">
                      <div className="flex justify-between">
                        <div className="flex-1">
                          <h3 className="font-bold text-gray-800">{item.title}</h3>
                          <p className="text-gray-600 text-sm mb-2">{item.content.substring(0, 100)}...</p>
                          <div className="flex gap-2">
                            <span className={`px-2 py-1 rounded text-xs font-medium ${channelColors[item.channel]}`}>{item.channel}</span>
                            <span className={`px-2 py-1 rounded text-xs font-medium ${statusColors[item.status]}`}>{item.status}</span>
                          </div>
                        </div>
                        <div className="flex gap-1 ml-4">
                          {item.status === 'draft' && <button onClick={() => updateStatus(item.id, 'pending')} className="p-2 hover:bg-yellow-100 rounded">👁️</button>}
                          {item.status === 'pending' && <button onClick={() => updateStatus(item.id, 'scheduled')} className="p-2 hover:bg-green-100 rounded">✅</button>}
                          <button onClick={() => { setRepurposingId(item.id); setShowRepurposeModal(true); }} className="p-2 hover:bg-purple-100 rounded">⚡</button>
                          <button onClick={() => deleteContent(item.id)} className="p-2 hover:bg-red-100 rounded">🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {view === 'calendar' && (
              <div className="bg-white rounded-lg shadow-lg p-6">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-2xl font-bold">{months[selectedMonth.getMonth()]} {selectedMonth.getFullYear()}</h2>
                  <div className="flex gap-2">
                    <button onClick={() => setSelectedMonth(new Date(selectedMonth.getFullYear(), selectedMonth.getMonth() - 1))} className="px-3 py-1 bg-gray-200 rounded">←</button>
                    <button onClick={() => setSelectedMonth(new Date())} className="px-3 py-1 bg-gray-200 rounded">Today</button>
                    <button onClick={() => setSelectedMonth(new Date(selectedMonth.getFullYear(), selectedMonth.getMonth() + 1))} className="px-3 py-1 bg-gray-200 rounded">→</button>
                  </div>
                </div>
                <div className="grid grid-cols-7 gap-1">
                  {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => <div key={d} className="text-center font-bold text-gray-600 py-2">{d}</div>)}
                  {Array(getFirstDayOfMonth(selectedMonth)).fill(null).map((_, i) => <div key={i} className="bg-gray-50 rounded p-2 h-24"></div>)}
                  {Array(getDaysInMonth(selectedMonth)).fill(null).map((_, i) => {
                    const day = i + 1;
                    const items = getContentForDate(day);
                    const plannerItems = getPlannerForDate(day);
                    const plannerColors = { newsletter: 'bg-blue-200', social: 'bg-purple-200', '1:1 email': 'bg-orange-200', campaign: 'bg-green-200', 'channel readiness': 'bg-yellow-200', internal: 'bg-gray-200' };
                    const statusIcons = { 'not started': '⚪', 'in progress': '🟡', 'for review': '🔵', 'complete': '✅' };
                    return (
                      <div key={day} className="bg-gray-50 rounded p-2 h-24 border overflow-y-auto">
                        <div className="font-bold text-sm">{day}</div>
                        {plannerItems.map(p => <div key={p.id} className={`text-xs p-1 rounded mt-1 ${plannerColors[p.contentType]} border border-gray-400`}>{statusIcons[p.status]} {p.contentType.substring(0, 6)}</div>)}
                        {items.map(item => <div key={item.id} className={`text-xs p-1 rounded mt-1 ${channelColors[item.channel]}`}>{item.title.substring(0, 10)}</div>)}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {view === 'planner' && (
              <div className="space-y-4">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-2xl font-bold">Content Planner</h2>
                  <button onClick={() => setShowPlannerModal(true)} className="px-4 py-2 bg-red-700 text-white rounded-lg font-medium">➕ Add Item</button>
                </div>
                {planner.length === 0 ? (
                  <div className="bg-white rounded-lg shadow p-8 text-center text-gray-500">No planned content yet!</div>
                ) : (
                  <div className="bg-white rounded-lg shadow-lg overflow-hidden">
                    <table className="w-full">
                      <thead className="bg-red-700 text-white">
                        <tr>
                          <th className="px-6 py-3 text-left font-bold">Content Type</th>
                          <th className="px-6 py-3 text-left font-bold">Deployment Date</th>
                          <th className="px-6 py-3 text-left font-bold">Owner</th>
                          <th className="px-6 py-3 text-left font-bold">Status</th>
                          <th className="px-6 py-3 text-center font-bold">Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        {planner.map(item => (
                          <tr key={item.id} className="border-t hover:bg-gray-50">
                            <td className="px-6 py-3 capitalize font-medium text-gray-800">{item.contentType}</td>
                            <td className="px-6 py-3 text-gray-600">{item.deploymentDate}</td>
                            <td className="px-6 py-3 text-gray-600">{item.owner || '-'}</td>
                            <td className="px-6 py-3">
                              <select value={item.status} onChange={(e) => {
                                if (e.target.value === 'for review') {
                                  setReviewingId(item.id);
                                  setReviewData({ documentUrl: '', reviewerEmails: '' });
                                } else {
                                  updatePlannerStatus(item.id, e.target.value);
                                }
                              }} className="px-2 py-1 border rounded text-sm">
                                <option value="not started">Not Started</option>
                                <option value="in progress">In Progress</option>
                                <option value="for review">For Review</option>
                                <option value="complete">Complete</option>
                              </select>
                            </td>
                            <td className="px-6 py-3 text-center">
                              <button onClick={() => startEditPlanner(item)} className="text-blue-600 hover:text-blue-800 font-bold mr-2">Edit</button>
                              <button onClick={() => deletePlannerItem(item.id)} className="text-red-600 hover:text-red-800 font-bold">Delete</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>

          {showCreateModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <h2 className="text-2xl font-bold mb-4">Create Content</h2>
                  <div className="space-y-3">
                    <input type="text" placeholder="Title" value={formData.title} onChange={(e) => setFormData({ ...formData, title: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    <select value={formData.channel} onChange={(e) => handleChannelChange(e.target.value)} className="w-full px-3 py-2 border rounded">
                      <option value="">Select Channel</option>
                      <option value="newsletter">Newsletter</option>
                      <option value="social">Social</option>
                      <option value="twitter">Twitter</option>
                      <option value="facebook">Facebook</option>
                      <option value="email">Email</option>
                    </select>
                    <input type="date" value={formData.date} onChange={(e) => setFormData({ ...formData, date: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    
                    {formData.channel && (
                      <div className="bg-blue-50 border border-blue-200 rounded p-3 text-sm">
                        <p className="text-blue-900 font-medium mb-2">📋 Template for {formData.channel.toUpperCase()}</p>
                        <p className="text-blue-800">Your template is ready below. Edit it or use AI to auto-fill the bracketed sections.</p>
                      </div>
                    )}
                    
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Content</label>
                      <textarea placeholder="Content" value={formData.content} onChange={(e) => setFormData({ ...formData, content: e.target.value })} className="w-full px-3 py-2 border rounded h-32 font-mono text-sm" />
                    </div>

                    <div className="border rounded p-2 bg-gray-50 max-h-32 overflow-y-auto text-sm">
                      <p className="font-bold mb-2">Featured Items</p>
                      {Object.entries(catalogue).map(([cat, items]) => (
                        <div key={cat}>
                          <p className="text-xs font-bold text-gray-600 mt-1">{cat}</p>
                          {items.map(item => (
                            <label key={item.id} className="flex items-center text-xs p-1">
                              <input type="checkbox" checked={selectedCatalogueItems.includes(item.id)} onChange={(e) => e.target.checked ? setSelectedCatalogueItems([...selectedCatalogueItems, item.id]) : setSelectedCatalogueItems(selectedCatalogueItems.filter(id => id !== item.id))} className="w-3 h-3" />
                              <span className="ml-2">{item.name}</span>
                            </label>
                          ))}
                        </div>
                      ))}
                    </div>

                    <div className="flex gap-2">
                      <button onClick={() => setShowGenerateModal(true)} disabled={!formData.channel} className="flex-1 bg-purple-600 text-white py-2 rounded font-medium disabled:opacity-50 disabled:cursor-not-allowed">✨ AI Fill Template</button>
                      <button onClick={saveContent} className="flex-1 bg-red-700 text-white py-2 rounded font-medium">Save</button>
                      <button onClick={() => setShowCreateModal(false)} className="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showGenerateModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold mb-4">AI Fill Template</h2>
                  <p className="text-sm text-gray-600 mb-3">Describe what you'd like Claude to fill in the template. Be specific about the offer, tone, or focus.</p>
                  <input type="text" placeholder="e.g., 'Summer roaming pass promotion, exciting and urgent'" value={formData.description} onChange={(e) => setFormData({ ...formData, description: e.target.value })} className="w-full px-3 py-2 border rounded mb-4" />
                  <div className="flex gap-2">
                    <button onClick={generateContent} disabled={generating} className="flex-1 bg-purple-600 text-white py-2 rounded font-medium disabled:opacity-50">{generating ? 'Generating...' : 'Fill Template'}</button>
                    <button onClick={() => setShowGenerateModal(false)} className="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showRepurposeModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold mb-4">Repurpose</h2>
                  <div className="space-y-2 mb-4">
                    {['social', 'twitter', 'facebook', 'email'].map(ch => (
                      <label key={ch} className="flex items-center p-3 border rounded">
                        <input type="checkbox" checked={selectedChannels[ch] || false} onChange={(e) => setSelectedChannels({ ...selectedChannels, [ch]: e.target.checked })} />
                        <span className="ml-3 capitalize font-medium">{ch}</span>
                      </label>
                    ))}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={repurposeContent} disabled={generating} className="flex-1 bg-purple-600 text-white py-2 rounded font-medium disabled:opacity-50">{generating ? 'Working...' : 'Repurpose'}</button>
                    <button onClick={() => setShowRepurposeModal(false)} className="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showPlannerModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold mb-4">Add Planned Content</h2>
                  <div className="space-y-3">
                    <select value={plannerData.contentType} onChange={(e) => setPlannerData({ ...plannerData, contentType: e.target.value })} className="w-full px-3 py-2 border rounded">
                      <option value="">Select Content Type</option>
                      <option value="newsletter">Newsletter</option>
                      <option value="social">Social</option>
                      <option value="1:1 email">1:1 Email</option>
                      <option value="campaign">Campaign</option>
                      <option value="channel readiness">Channel Readiness</option>
                      <option value="internal">Internal</option>
                    </select>
                    {plannerData.contentType && (
                      <textarea placeholder="What needs to be created? (e.g., Summer promotion for loyalty members)" value={plannerData.description || ''} onChange={(e) => setPlannerData({ ...plannerData, description: e.target.value })} className="w-full px-3 py-2 border rounded h-20" />
                    )}
                    <input type="date" value={plannerData.deploymentDate} onChange={(e) => setPlannerData({ ...plannerData, deploymentDate: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    <input type="text" placeholder="Owner (name or email)" value={plannerData.owner || ''} onChange={(e) => setPlannerData({ ...plannerData, owner: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    <select value={plannerData.status} onChange={(e) => setPlannerData({ ...plannerData, status: e.target.value })} className="w-full px-3 py-2 border rounded">
                      <option value="not started">Not Started</option>
                      <option value="in progress">In Progress</option>
                      <option value="for review">For Review</option>
                      <option value="complete">Complete</option>
                    </select>
                    <div className="flex gap-2">
                      <button onClick={savePlannerItem} className="flex-1 bg-red-700 text-white py-2 rounded font-medium">Add</button>
                      <button onClick={() => { setShowPlannerModal(false); setPlannerData({ contentType: '', deploymentDate: '', status: 'not started' }); }} className="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {reviewingId && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold mb-4">Send for Review</h2>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Document URL</label>
                      <input type="url" placeholder="https://docs.google.com/..." value={reviewData.documentUrl} onChange={(e) => setReviewData({ ...reviewData, documentUrl: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Reviewer Emails</label>
                      <input type="text" placeholder="reviewer1@telus.com, reviewer2@telus.com" value={reviewData.reviewerEmails} onChange={(e) => setReviewData({ ...reviewData, reviewerEmails: e.target.value })} className="w-full px-3 py-2 border rounded" />
                      <p className="text-xs text-gray-500 mt-1">Separate multiple emails with commas</p>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={sendForReview} className="flex-1 bg-purple-600 text-white py-2 rounded font-medium">📧 Send for Review</button>
                      <button onClick={() => { setReviewingId(null); setReviewData({ documentUrl: '', reviewerEmails: '' }); }} className="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {editingPlanId && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold mb-4">Edit Planner Item</h2>
                  <div className="space-y-3">
                    <select value={editPlanData.contentType} onChange={(e) => setEditPlanData({ ...editPlanData, contentType: e.target.value })} className="w-full px-3 py-2 border rounded">
                      <option value="">Select Content Type</option>
                      <option value="newsletter">Newsletter</option>
                      <option value="social">Social</option>
                      <option value="1:1 email">1:1 Email</option>
                      <option value="campaign">Campaign</option>
                      <option value="channel readiness">Channel Readiness</option>
                      <option value="internal">Internal</option>
                    </select>
                    {editPlanData.contentType && (
                      <textarea placeholder="What needs to be created?" value={editPlanData.description || ''} onChange={(e) => setEditPlanData({ ...editPlanData, description: e.target.value })} className="w-full px-3 py-2 border rounded h-20" />
                    )}
                    <input type="date" value={editPlanData.deploymentDate} onChange={(e) => setEditPlanData({ ...editPlanData, deploymentDate: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    <input type="text" placeholder="Owner (name or email)" value={editPlanData.owner || ''} onChange={(e) => setEditPlanData({ ...editPlanData, owner: e.target.value })} className="w-full px-3 py-2 border rounded" />
                    <select value={editPlanData.status} onChange={(e) => setEditPlanData({ ...editPlanData, status: e.target.value })} className="w-full px-3 py-2 border rounded">
                      <option value="not started">Not Started</option>
                      <option value="in progress">In Progress</option>
                      <option value="for review">For Review</option>
                      <option value="complete">Complete</option>
                    </select>
                    <div className="flex gap-2">
                      <button onClick={saveEditPlanner} className="flex-1 bg-red-700 text-white py-2 rounded font-medium">Save</button>
                      <button onClick={() => { setEditingPlanId(null); setEditPlanData({}); }} className="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<TELUSRewardsDashboard />, document.getElementById('root'));
  </script>
</body>
</html>
