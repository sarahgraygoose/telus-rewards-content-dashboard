<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TELUS Rewards Content Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TELUSRewardsDashboard = () => {
      const [content, setContent] = useState([]);
      const [view, setView] = useState('calendar');
      const [selectedMonth, setSelectedMonth] = useState(new Date());
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [showGenerateModal, setShowGenerateModal] = useState(false);
      const [showRepurposeModal, setShowRepurposeModal] = useState(false);
      const [showBrandGuide, setShowBrandGuide] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [repurposingId, setRepurposingId] = useState(null);
      const [selectedChannels, setSelectedChannels] = useState({});
      const [selectedCatalogueItems, setSelectedCatalogueItems] = useState([]);
      const [formData, setFormData] = useState({ 
        title: '', 
        channel: '', 
        date: '', 
        status: 'draft', 
        content: '', 
        description: '' 
      });

      const catalogue = {
        "My TELUS Perks": [
          { id: "perk-1", name: "TELUS 1-Day Roaming Pass", value: "Unlimited international data & calls", tier: "Gold+" },
          { id: "perk-2", name: "TELUS 3-Day Roaming Pass", value: "Unlimited international data & calls", tier: "Diamond" },
          { id: "perk-3", name: "Mobile Klinik Protector Pro", value: "Phone repair & protection coverage", tier: "Purple+" },
          { id: "perk-4", name: "TELUS Health MyCare™ Counselling", value: "Professional counselling sessions", tier: "Gold+" },
          { id: "perk-5", name: "Seat Selection Vouchers", value: "Free seat selection with WestJet", tier: "Platinum+" }
        ],
        "My Partner Perks": [
          { id: "perk-6", name: "WestJet Rewards Points", value: "Convert TELUS points to travel rewards", tier: "All" },
          { id: "perk-7", name: "Skip the Dishes Code", value: "$15-30 off food delivery", tier: "Gold+" },
          { id: "perk-8", name: "Turo Car Rental Credit", value: "$50 off Turo rentals of $75+", tier: "Platinum+" },
          { id: "perk-9", name: "TELUS Rewards Hotel Credits", value: "Stackable hotel discounts powered by TLC Worldwide", tier: "Gold+" },
          { id: "perk-10", name: "Cineplex Entertainment", value: "Movie ticket discounts", tier: "Purple+" }
        ],
        "Gift Cards": [
          { id: "gc-1", name: "Amazon Gift Card", value: "$25, $50, $100", pointsCost: "2500-10000" },
          { id: "gc-2", name: "Uber Gift Card", value: "$10, $25, $50", pointsCost: "1000-5000" },
          { id: "gc-3", name: "DoorDash Gift Card", value: "$15, $30, $75", pointsCost: "1500-7500" },
          { id: "gc-4", name: "Spotify Premium", value: "3-month subscription", pointsCost: "3000" },
          { id: "gc-5", name: "Apple iTunes Card", value: "$15, $30, $50", pointsCost: "1500-5000" }
        ],
        "Contests": [
          { id: "contest-1", name: "WestJet Flight Giveaway", value: "Round-trip flights for 2", entry: "Zero-point entry" },
          { id: "contest-2", name: "Staycation Package", value: "$2000 hotel credit package", entry: "Zero-point entry" },
          { id: "contest-3", name: "Tech Bundle", value: "Latest tech gadgets", entry: "Zero-point entry" }
        ]
      };

      useEffect(() => {
        const stored = localStorage.getItem('telusContent');
        if (stored) setContent(JSON.parse(stored));
        else initializeSampleData();
      }, []);

      useEffect(() => {
        localStorage.setItem('telusContent', JSON.stringify(content));
      }, [content]);

      const initializeSampleData = () => {
        const sampleContent = [
          { id: 1, title: 'Summer Rewards Promo', channel: 'newsletter', date: '2026-06-20', status: 'scheduled', content: 'TELUS Rewards members can now earn more points on summer services...', description: 'Main summer promotion' },
          { id: 2, title: 'Weekend Bonus Points', channel: 'social', date: '2026-06-15', status: 'pending', content: 'Double points this weekend! Unlock exclusive perks as a TELUS Rewards member.', description: 'Instagram post' },
        ];
        setContent(sampleContent);
      };

      const generateContent = async () => {
        if (!formData.description || !formData.channel) {
          alert('Please fill in description and channel');
          return;
        }

        setGenerating(true);
        try {
          let catalogueContext = '';
          if (selectedCatalogueItems.length > 0) {
            const featured = [];
            Object.values(catalogue).forEach(items => {
              items.forEach(item => {
                if (selectedCatalogueItems.includes(item.id)) {
                  featured.push(`- ${item.name}: ${item.value}`);
                }
              });
            });
            catalogueContext = `\n\nFEATURED OFFERS/PERKS TO HIGHLIGHT:\n${featured.join('\n')}`;
          }

          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 1000,
              messages: [{
                role: 'user',
                content: `You are a TELUS Rewards content expert. Generate content following these brand rules:
- Use "TELUS Rewards" (not Telus)
- Refer to "members" not "customers"
- Use "earn points", "redeem points", capitalize tier names (Purple, Gold, Platinum, Diamond)
- Brand voice: Customers First, Innovative, Engaging
- Never say "free perks" or "best loyalty program"

Channel: ${formData.channel}
Description: ${formData.description}${catalogueContext}

Provide ONLY the content text, no explanations.`
              }]
            })
          });

          const data = await response.json();
          const generatedText = data.content[0]?.text || 'Unable to generate content';
          setFormData({ ...formData, content: generatedText });
          setShowGenerateModal(false);
          alert('Content generated!');
        } catch (error) {
          alert('Error: ' + error.message);
        }
        setGenerating(false);
      };

      const repurposeContent = async () => {
        const item = content.find(c => c.id === repurposingId);
        const channelsToCreate = Object.keys(selectedChannels).filter(ch => selectedChannels[ch]);
        
        if (channelsToCreate.length === 0) {
          alert('Select at least one channel');
          return;
        }

        setGenerating(true);
        try {
          for (const channel of channelsToCreate) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 500,
                messages: [{
                  role: 'user',
                  content: `Adapt this content for ${channel}. Keep TELUS Rewards branding, use "members", capitalize tier names. For ${channel}, optimize for platform best practices.

Original: ${item.content}

Provide ONLY the adapted content.`
                }]
              })
            });

            const data = await response.json();
            const newContent = {
              id: Date.now() + Math.random(),
              title: `${item.title} - ${channel}`,
              channel: channel,
              date: item.date,
              status: 'draft',
              content: data.content[0]?.text || 'Generated',
              description: `From: ${item.title}`
            };
            setContent(prev => [...prev, newContent]);
          }
          setShowRepurposeModal(false);
          setSelectedChannels({});
          alert('Content repurposed!');
        } catch (error) {
          alert('Error: ' + error.message);
        }
        setGenerating(false);
      };

      const saveContent = () => {
        if (!formData.title || !formData.channel || !formData.date || !formData.content) {
          alert('Please fill in all fields');
          return;
        }

        if (editingId) {
          setContent(content.map(c => c.id === editingId ? { ...c, ...formData } : c));
          setEditingId(null);
        } else {
          setContent([...content, { ...formData, id: Date.now(), status: 'draft' }]);
        }
        setFormData({ title: '', channel: '', date: '', status: 'draft', content: '', description: '' });
        setSelectedCatalogueItems([]);
        setShowCreateModal(false);
      };

      const deleteContent = (id) => {
        setContent(content.filter(c => c.id !== id));
      };

      const updateStatus = (id, status) => {
        setContent(content.map(c => c.id === id ? { ...c, status } : c));
      };

      const getDaysInMonth = (date) => {
        return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
      };

      const getFirstDayOfMonth = (date) => {
        return new Date(date.getFullYear(), date.getMonth(), 1).getDay();
      };

      const getContentForDate = (day) => {
        const dateStr = `${selectedMonth.getFullYear()}-${String(selectedMonth.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return content.filter(c => c.date === dateStr);
      };

      const channelColors = {
        newsletter: 'bg-blue-100 text-blue-800',
        social: 'bg-purple-100 text-purple-800',
        contest: 'bg-green-100 text-green-800',
        email: 'bg-orange-100 text-orange-800',
        twitter: 'bg-cyan-100 text-cyan-800',
        facebook: 'bg-indigo-100 text-indigo-800'
      };

      const statusColors = {
        draft: 'bg-gray-100 text-gray-800',
        pending: 'bg-yellow-100 text-yellow-800',
        scheduled: 'bg-blue-100 text-blue-800',
        published: 'bg-green-100 text-green-800'
      };

      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

      return (
        <div className="min-h-screen bg-gradient-to-br from-red-50 to-gray-100">
          <div className="bg-red-700 text-white p-6 shadow-lg">
            <div className="max-w-7xl mx-auto">
              <h1 className="text-3xl font-bold mb-2">TELUS Rewards Content Hub</h1>
              <p className="text-red-100">Manage, create, and schedule all your content with brand-aligned AI assistance</p>
            </div>
          </div>

          <div className="max-w-7xl mx-auto p-6">
            <div className="flex gap-4 mb-6 flex-wrap">
              <button onClick={() => setView('calendar')} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition ${view === 'calendar' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📅 Calendar</button>
              <button onClick={() => setView('list')} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition ${view === 'list' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📝 Content</button>
              <button onClick={() => setView('catalogue')} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition ${view === 'catalogue' ? 'bg-red-700 text-white' : 'bg-white text-gray-700'}`}>📚 Catalogue</button>
              <button onClick={() => setShowBrandGuide(!showBrandGuide)} className="flex items-center gap-2 px-4 py-2 bg-white text-gray-700 rounded-lg font-medium">📖 Brand Guide</button>
              <button onClick={() => { setShowCreateModal(true); setEditingId(null); setFormData({ title: '', channel: '', date: '', status: 'draft', content: '', description: '' }); setSelectedCatalogueItems([]); }} className="ml-auto flex items-center gap-2 px-4 py-2 bg-red-700 text-white rounded-lg font-medium">➕ New Content</button>
            </div>

            {view === 'catalogue' && (
              <div className="space-y-6">
                {Object.entries(catalogue).map(([category, items]) => (
                  <div key={category} className="bg-white rounded-lg shadow-lg p-6">
                    <h3 className="text-xl font-bold text-red-700 mb-4">{category}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {items.map(item => (
                        <div key={item.id} className="border rounded-lg p-4">
                          <h4 className="font-bold text-gray-800 mb-2">{item.name}</h4>
                          <p className="text-sm text-gray-600 mb-2">{item.value}</p>
                          <div className="flex gap-2 flex-wrap">
                            {item.tier && <span className="text-xs bg-red-100 text-red-800 px-2 py-1 rounded">{item.tier}</span>}
                            {item.pointsCost && <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">{item.pointsCost} points</span>}
                            {item.entry && <span className="text-xs bg-green-100 text-green-800 px-2 py-1 rounded">{item.entry}</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view === 'list' && (
              <div className="space-y-4">
                {content.length === 0 ? (
                  <div className="bg-white rounded-lg shadow p-8 text-center text-gray-500">No content yet. Create your first piece!</div>
                ) : (
                  content.map(item => (
                    <div key={item.id} className="bg-white rounded-lg shadow p-4">
                      <div className="flex items-start justify-between">
                        <div className="flex-1">
                          <h3 className="text-lg font-bold text-gray-800 mb-2">{item.title}</h3>
                          <p className="text-gray-600 mb-3">{item.content.substring(0, 150)}...</p>
                          <div className="flex gap-2">
                            <span className={`px-3 py-1 rounded-full text-sm font-medium ${channelColors[item.channel]}`}>{item.channel}</span>
                            <span className={`px-3 py-1 rounded-full text-sm font-medium ${statusColors[item.status]}`}>{item.status}</span>
                            <span className="px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-800">{item.date}</span>
                          </div>
                        </div>
                        <div className="flex gap-2 ml-4">
                          {item.status === 'draft' && <button onClick={() => updateStatus(item.id, 'pending')} className="p-2 hover:bg-yellow-100 rounded">👁️</button>}
                          {item.status === 'pending' && <button onClick={() => updateStatus(item.id, 'scheduled')} className="p-2 hover:bg-blue-100 rounded">✅</button>}
                          <button onClick={() => { setRepurposingId(item.id); setShowRepurposeModal(true); setSelectedChannels({}); }} className="p-2 hover:bg-purple-100 rounded">⚡</button>
                          <button onClick={() => deleteContent(item.id)} className="p-2 hover:bg-red-100 rounded">🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {view === 'calendar' && (
              <div className="bg-white rounded-lg shadow-lg p-6">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-2xl font-bold text-gray-800">{months[selectedMonth.getMonth()]} {selectedMonth.getFullYear()}</h2>
                  <div className="flex gap-2">
                    <button onClick={() => setSelectedMonth(new Date(selectedMonth.getFullYear(), selectedMonth.getMonth() - 1))} className="px-4 py-2 bg-gray-200 rounded">← Prev</button>
                    <button onClick={() => setSelectedMonth(new Date())} className="px-4 py-2 bg-gray-200 rounded">Today</button>
                    <button onClick={() => setSelectedMonth(new Date(selectedMonth.getFullYear(), selectedMonth.getMonth() + 1))} className="px-4 py-2 bg-gray-200 rounded">Next →</button>
                  </div>
                </div>
                <div className="grid grid-cols-7 gap-2">
                  {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => <div key={day} className="text-center font-bold text-gray-600 py-2">{day}</div>)}
                  {Array(getFirstDayOfMonth(selectedMonth)).fill(null).map((_, i) => <div key={`empty-${i}`} className="bg-gray-50 rounded p-2 h-32"></div>)}
                  {Array(getDaysInMonth(selectedMonth)).fill(null).map((_, i) => {
                    const day = i + 1;
                    const dayContent = getContentForDate(day);
                    return (
                      <div key={day} className="bg-gray-50 rounded p-2 h-32 border border-gray-200 overflow-y-auto">
                        <div className="font-bold text-gray-800 mb-1">{day}</div>
                        {dayContent.map(item => <div key={item.id} className={`text-xs p-1 rounded ${channelColors[item.channel]}`}>{item.title.substring(0, 12)}...</div>)}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {showCreateModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div className="p-6">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">Create New Content</h2>
                  <div className="space-y-4">
                    <input type="text" placeholder="Title" value={formData.title} onChange={(e) => setFormData({ ...formData, title: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-700" />
                    <select value={formData.channel} onChange={(e) => setFormData({ ...formData, channel: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-700">
                      <option value="">Select Channel</option>
                      <option value="newsletter">Newsletter</option>
                      <option value="social">Social Media</option>
                      <option value="twitter">Twitter</option>
                      <option value="facebook">Facebook</option>
                      <option value="email">Email</option>
                      <option value="contest">Contest</option>
                    </select>
                    <input type="date" value={formData.date} onChange={(e) => setFormData({ ...formData, date: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-700" />
                    <textarea placeholder="Content" value={formData.content} onChange={(e) => setFormData({ ...formData, content: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-700 h-24" />
                    <div className="border rounded-lg p-3 bg-gray-50 max-h-40 overflow-y-auto">
                      <label className="text-sm font-semibold text-gray-700 block mb-2">Featured Offers/Perks</label>
                      {Object.entries(catalogue).map(([category, items]) => (
                        <div key={category}>
                          <p className="text-xs font-bold text-gray-600 mt-2 mb-1">{category}</p>
                          {items.map(item => (
                            <label key={item.id} className="flex items-center text-sm p-1 cursor-pointer">
                              <input type="checkbox" checked={selectedCatalogueItems.includes(item.id)} onChange={(e) => e.target.checked ? setSelectedCatalogueItems([...selectedCatalogueItems, item.id]) : setSelectedCatalogueItems(selectedCatalogueItems.filter(id => id !== item.id))} className="w-3 h-3 text-red-700" />
                              <span className="ml-2">{item.name}</span>
                            </label>
                          ))}
                        </div>
                      ))}
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => setShowGenerateModal(true)} className="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 font-medium">✨ AI Generate</button>
                      <button onClick={saveContent} className="flex-1 bg-red-700 text-white px-4 py-2 rounded-lg hover:bg-red-800 font-medium">Save</button>
                      <button onClick={() => setShowCreateModal(false)} className="px-4 py-2 bg-gray-300 rounded-lg">Cancel</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showGenerateModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">✨ Generate Content</h2>
                  <input type="text" placeholder="Describe your content" value={formData.description} onChange={(e) => setFormData({ ...formData, description: e.target.value })} className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-red-700 mb-4" />
                  <div className="flex gap-2">
                    <button onClick={generateContent} disabled={generating} className="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-50">{generating ? 'Generating...' : 'Generate'}</button>
                    <button onClick={() => setShowGenerateModal(false)} className="px-4 py-2 bg-gray-300 rounded-lg">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showRepurposeModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-lg shadow-xl max-w-lg w-full">
                <div className="p-6">
                  <h2 className="text-2xl font-bold text-gray-800 mb-4">🔄 Repurpose</h2>
                  <div className="space-y-3 mb-6">
                    {['social', 'twitter', 'facebook', 'email'].map(ch => (
                      <label key={ch} className="flex items-center p-3 border rounded-lg cursor-pointer">
                        <input type="checkbox" checked={selectedChannels[ch] || false} onChange={(e) => setSelectedChannels({ ...selectedChannels, [ch]: e.target.checked })} className="w-4 h-4 text-purple-600" />
                        <span className="ml-3 font-semibold capitalize">{ch}</span>
                      </label>
                    ))}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={repurposeContent} disabled={generating} className="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 font-medium disabled:opacity-50">{generating ? 'Repurposing...' : 'Repurpose'}</button>
                    <button onClick={() => setShowRepurposeModal(false)} className="px-4 py-2 bg-gray-300 rounded-lg">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<TELUSRewardsDashboard />, document.getElementById('root'));
  </script>
</body>
</html>
